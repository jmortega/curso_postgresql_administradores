# =============================================================
# postgresql.conf — Laboratorio de Mantenimiento
# pg_cron habilitado + WAL archiving + logging completo
# =============================================================

listen_addresses            = '*'
port                        = 5432
max_connections             = 100

# ── pg_cron ───────────────────────────────────────────────────
shared_preload_libraries    = 'pg_cron'
cron.database_name          = 'postgres'
cron.timezone               = 'Europe/Madrid'
cron.host                   = '127.0.0.1'

# ── WAL y archivado (necesario para backup físico) ────────────
wal_level                   = replica
max_wal_senders             = 3
max_replication_slots       = 3
archive_mode                = on
archive_command             = 'test ! -f /backup/wal_archive/%f && cp %p /backup/wal_archive/%f'
archive_timeout             = 60

# ── Autovacuum ────────────────────────────────────────────────
autovacuum                          = on
autovacuum_max_workers              = 3
autovacuum_naptime                  = 30s
autovacuum_vacuum_threshold         = 50
autovacuum_vacuum_scale_factor      = 0.02
autovacuum_analyze_scale_factor     = 0.01
autovacuum_vacuum_cost_delay        = 2ms
log_autovacuum_min_duration         = 0     # loguear todos los autovacuums en lab

# ── Logging ───────────────────────────────────────────────────
log_destination             = 'stderr'
logging_collector           = on
log_directory               = '/var/log/pg_lab'
log_filename                = 'postgresql-%Y-%m-%d.log'
log_rotation_age            = 1d
log_rotation_size           = 100MB
log_min_messages            = info
log_min_duration_statement  = 500    # loguear queries > 500 ms
log_connections             = on
log_disconnections          = on
log_checkpoints             = on
log_lock_waits              = on
log_temp_files              = 10MB
log_line_prefix             = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# ── Performance (lab) ─────────────────────────────────────────
shared_buffers              = 128MB
effective_cache_size        = 384MB
work_mem                    = 16MB
maintenance_work_mem        = 64MB
checkpoint_completion_target = 0.9

# ── Seguridad ─────────────────────────────────────────────────
password_encryption         = scram-sha-256
