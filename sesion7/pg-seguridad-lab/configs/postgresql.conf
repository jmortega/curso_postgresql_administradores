# =============================================================
# postgresql.conf — Laboratorio de Seguridad
# Configuración endurecida con pgAudit habilitado
# =============================================================

# ── Conexión ──────────────────────────────────────────────────
listen_addresses            = '*'
port                        = 5432
max_connections             = 100

# ── Autenticación ─────────────────────────────────────────────
password_encryption         = scram-sha-256
authentication_timeout      = 10s

# ── Timeouts de seguridad ─────────────────────────────────────
statement_timeout                       = 0       # Desactivado en lab (activar por rol)
lock_timeout                            = 5s
idle_in_transaction_session_timeout     = 120s
idle_session_timeout                    = 0       # Desactivado en lab

# ── SSL/TLS ───────────────────────────────────────────────────
ssl                         = on
ssl_cert_file               = '/etc/postgresql/ssl/server.crt'
ssl_key_file                = '/etc/postgresql/ssl/server.key'
ssl_ca_file                 = '/etc/postgresql/ssl/ca.crt'
ssl_min_protocol_version    = 'TLSv1.2'
ssl_ciphers                 = 'HIGH:MEDIUM:+3DES:!aNULL'
ssl_prefer_server_ciphers   = on

# ── Logging ───────────────────────────────────────────────────
log_destination             = 'stderr'
logging_collector           = on
log_directory               = '/var/log/postgresql'
log_filename                = 'postgresql-%Y-%m-%d.log'
log_rotation_age            = 1d
log_rotation_size           = 100MB
log_min_messages            = info
log_min_error_statement     = error
log_connections             = on
log_disconnections          = on
log_line_prefix             = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# ── pgAudit ───────────────────────────────────────────────────
shared_preload_libraries    = 'pgaudit'
pgaudit.log                 = 'write, ddl, role, connection'
pgaudit.log_catalog         = off
pgaudit.log_parameter       = on
pgaudit.log_relation        = on
pgaudit.log_rows            = off
pgaudit.log_statement_once  = off

# ── Performance (lab) ─────────────────────────────────────────
shared_buffers              = 128MB
effective_cache_size        = 384MB
work_mem                    = 8MB
maintenance_work_mem        = 64MB

# ── WAL (lab) ─────────────────────────────────────────────────
wal_level                   = replica
checkpoint_completion_target = 0.9
