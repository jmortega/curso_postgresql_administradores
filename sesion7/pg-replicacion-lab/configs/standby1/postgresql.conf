# =============================================================
# postgresql.conf — Nodo STANDBY 1 (síncrono)
# pg-standby1 (172.20.0.11)
# =============================================================

listen_addresses            = '*'
port                        = 5432
max_connections             = 200

# ── Replicación ───────────────────────────────────────────────
wal_level                   = replica
max_wal_senders             = 10
max_replication_slots       = 10
hot_standby                 = on
hot_standby_feedback        = on

max_standby_streaming_delay = 30s
max_standby_archive_delay   = 60s

wal_receiver_timeout        = 60s

# ── Restaurar WAL desde archivo si el streaming falla ─────────
restore_command             = 'cp /mnt/wal_archive/%f %p 2>/dev/null || true'

# ── Performance ───────────────────────────────────────────────
shared_buffers              = 256MB
effective_cache_size        = 768MB
work_mem                    = 16MB

# ── Archivado ─────────────────────────────────────────────────
archive_mode                = always    # 'always' permite archivar WAL en standby
archive_command             = 'test ! -f /mnt/wal_archive/%f && cp %p /mnt/wal_archive/%f'
archive_timeout             = 60s

# ── Logging ───────────────────────────────────────────────────
log_min_messages            = warning
log_connections             = on
log_disconnections          = on
log_line_prefix             = '%t [%p] %u@%d '
log_replication_commands    = on

# ── Seguridad ─────────────────────────────────────────────────
password_encryption         = scram-sha-256

# ── repmgr ────────────────────────────────────────────────────
shared_preload_libraries = 'repmgr'  # FIX: obligatorio para que repmgrd pueda usar memoria compartida
