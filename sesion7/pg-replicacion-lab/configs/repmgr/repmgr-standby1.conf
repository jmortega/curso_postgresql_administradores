# =============================================================
# repmgr.conf — STANDBY 1 (node_id=2, priority=100)
# Primera opción de failover (prioridad más alta)
# =============================================================

node_id                 = 2
node_name               = 'pg-standby1'
conninfo                = 'host=pg-standby1 port=5432 dbname=repmgr user=repmgr password=repmgr_lab connect_timeout=5'
data_directory          = '/var/lib/postgresql/data'

pg_bindir               = '/usr/lib/postgresql/16/bin'

log_file                = '/var/log/repmgr/repmgr.log'
log_level               = INFO
log_facility            = STDERR

# ── Failover automático ───────────────────────────────────────
failover                = automatic
priority                = 100

# FIX: comandos en una sola línea (repmgr.conf no soporta \ de continuación)
# FIX: eliminado --log-to-file (opción inexistente en esta versión)
promote_command         = '/usr/lib/postgresql/16/bin/repmgr standby promote -f /etc/repmgr/repmgr.conf'
follow_command          = '/usr/lib/postgresql/16/bin/repmgr standby follow -f /etc/repmgr/repmgr.conf --upstream-node-id=%n'

# ── Tiempos de detección de fallo ─────────────────────────────
monitor_interval_secs   = 5
reconnect_attempts      = 4
reconnect_interval      = 5

# ── Sin SSH en contenedores Docker ────────────────────────────
# Con primary_visibility_consensus=false repmgrd promueve sin
# necesitar confirmar con otros nodos via SSH.
primary_visibility_consensus = false

pg_basebackup_options   = '--wal-method=stream --checkpoint=fast'
event_notification_command  = '/scripts/notify_event.sh %n %e %s "%t" "%d"'
monitoring_history      = yes
