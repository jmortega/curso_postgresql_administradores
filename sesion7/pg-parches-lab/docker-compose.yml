version: "3.8"

# =============================================================
# Laboratorio: Planes de Despliegue de Parches PostgreSQL
#
# Stack completo con Patroni + etcd + HAProxy:
#
#   etcd          → almacén de configuración del clúster
#   pg-primary    → nodo primario PostgreSQL 16 + Patroni
#   pg-replica1   → réplica 1 (candidata a failover, priority=100)
#   pg-replica2   → réplica 2 (candidata a failover, priority=50)
#   haproxy       → balanceador: puerto 5000=escritura, 5001=lectura
#   pg-v15        → instancia PostgreSQL 15 (para prácticas de major upgrade)
#
# Puertos del host:
#   5000  → HAProxy → primario activo (escritura)
#   5001  → HAProxy → todas las réplicas (lectura)
#   5432  → pg-primary directo
#   5433  → pg-replica1 directo
#   5434  → pg-replica2 directo
#   5435  → pg-v15 (major upgrade lab)
#   8008  → Patroni REST API (pg-primary)
#   8009  → Patroni REST API (pg-replica1)
#   8010  → Patroni REST API (pg-replica2)
#   7000  → HAProxy stats
# =============================================================

networks:
  pg_patch_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  etcd_data:
  pg_primary_data:
  pg_replica1_data:
  pg_replica2_data:
  pg_v15_data:
  wal_archive:
  backup_data:

services:

  # -----------------------------------------------------------
  # ETCD — almacén de estado del clúster Patroni
  # FIX: bitnami/etcd ya no publica tags en Docker Hub.
  #      Se usa quay.io/coreos/etcd:v3.5.9 (imagen oficial upstream).
  #      El healthcheck se ajusta a etcdctl v3 sin ETCDCTL_API=3.
  # -----------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    hostname: etcd
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.10
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: etcd0
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: pg-patch-lab
      ETCD_DATA_DIR: /etcd-data
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -----------------------------------------------------------
  # NODO PRIMARIO — PostgreSQL 16 + Patroni
  # FIX: los volúmenes se montan en /data (padre), NO en /data/patroni.
  #      Si se monta directamente sobre PGDATA, ese directorio pasa a
  #      ser el propio punto de montaje del volumen, y Patroni no puede
  #      renombrarlo/eliminarlo (os.rename) durante un reinit o un
  #      fallback de pg_rewind → "OSError: Device or resource busy".
  #      Con el volumen en /data, /data/patroni es una subcarpeta
  #      normal, renombrable sin problema.
  # -----------------------------------------------------------
  pg-primary:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    image: pg-patroni:16
    container_name: pg-primary
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        chown -R postgres:postgres /data /mnt/wal_archive /backup
        chmod 700 /data/patroni
        exec gosu postgres patroni /etc/patroni/patroni.yml
    hostname: pgprimary
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.20
    environment:
      PATRONI_NAME:                pgprimary
      PATRONI_SCOPE:               pg-patch-cluster
      PATRONI_RESTAPI_LISTEN:      0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: pgprimary:8008
      PATRONI_ETCD3_HOSTS:         etcd:2379
      PATRONI_POSTGRESQL_LISTEN:   0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: pgprimary:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_SUPERUSER_USERNAME:  postgres
      PATRONI_SUPERUSER_PASSWORD:  postgres_lab
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: repl_lab_2025
      NODE_PRIORITY: "100"
    volumes:
      - pg_primary_data:/data
      - wal_archive:/mnt/wal_archive
      - backup_data:/backup
      - ./configs/patroni/patroni-primary-aux.yml:/etc/patroni/patroni.yml:ro
      - ./scripts:/scripts
    ports:
      - "5432:5432"
      - "8008:8008"
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  # -----------------------------------------------------------
  # RÉPLICA 1 — alta prioridad de failover
  # FIX: sin build: para evitar construcción paralela ("already exists").
  #      pull_policy: never usa la imagen local pg-patroni:16
  #      construida por pg-primary sin intentar pull a Docker Hub.
  # -----------------------------------------------------------
  pg-replica1:
    image: pg-patroni:16
    pull_policy: never
    container_name: pg-replica1
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        chown -R postgres:postgres /data /mnt/wal_archive
        chmod 700 /data/patroni
        exec gosu postgres patroni /etc/patroni/patroni.yml
    hostname: pgreplica1
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.21
    environment:
      PATRONI_NAME:                pgreplica1
      PATRONI_SCOPE:               pg-patch-cluster
      PATRONI_RESTAPI_LISTEN:      0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: pgreplica1:8008
      PATRONI_ETCD3_HOSTS:         etcd:2379
      PATRONI_POSTGRESQL_LISTEN:   0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: pgreplica1:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_SUPERUSER_USERNAME:  postgres
      PATRONI_SUPERUSER_PASSWORD:  postgres_lab
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: repl_lab_2025
      NODE_PRIORITY: "100"
    volumes:
      - pg_replica1_data:/data
      - wal_archive:/mnt/wal_archive
      - ./configs/patroni/patroni-replica1.yml:/etc/patroni/patroni.yml:ro
      - ./scripts:/scripts
    ports:
      - "5433:5432"
      - "8009:8008"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 50s
    restart: unless-stopped

  # -----------------------------------------------------------
  # RÉPLICA 2 — baja prioridad de failover
  # FIX: ídem que pg-replica1, pull_policy: never sin build:
  # -----------------------------------------------------------
  pg-replica2:
    image: pg-patroni:16
    pull_policy: never
    container_name: pg-replica2
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        chown -R postgres:postgres /data /mnt/wal_archive
        chmod 700 /data/patroni
        exec gosu postgres patroni /etc/patroni/patroni.yml
    hostname: pgreplica2
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.22
    environment:
      PATRONI_NAME:                pgreplica2
      PATRONI_SCOPE:               pg-patch-cluster
      PATRONI_RESTAPI_LISTEN:      0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: pgreplica2:8008
      PATRONI_ETCD3_HOSTS:         etcd:2379
      PATRONI_POSTGRESQL_LISTEN:   0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: pgreplica2:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_SUPERUSER_USERNAME:  postgres
      PATRONI_SUPERUSER_PASSWORD:  postgres_lab
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: repl_lab_2025
      NODE_PRIORITY: "50"
    volumes:
      - pg_replica2_data:/data
      - wal_archive:/mnt/wal_archive
      - ./configs/patroni/patroni-replica2.yml:/etc/patroni/patroni.yml:ro
      - ./scripts:/scripts
    ports:
      - "5434:5432"
      - "8010:8008"
    depends_on:
      pg-replica1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # -----------------------------------------------------------
  # HAPROXY — balanceo de carga y endpoint único de acceso
  # -----------------------------------------------------------
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    hostname: haproxy
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.30
    volumes:
      - ./configs/haproxy/haproxy-aux.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000"   # Escritura → primario activo
      - "5001:5001"   # Lectura  → cualquier réplica
      - "7000:7000"   # HAProxy stats
    depends_on:
      pg-primary:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------
  # PostgreSQL 15 — instancia independiente para major upgrade lab
  # -----------------------------------------------------------
  pg-v15:
    image: postgres:15-bookworm
    container_name: pg-v15
    hostname: pg-v15
    # FIX: wal_level=logical se pasa como argumento al proceso postgres
    # para que esté activo desde el primer arranque. ALTER SYSTEM requiere
    # reinicio y pg_reload_conf() no es suficiente para este parámetro.
    command: ["postgres", "-c", "wal_level=logical"]
    networks:
      pg_patch_net:
        ipv4_address: 172.28.0.40
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_lab
      POSTGRES_DB:       dwh
      PGDATA:            /var/lib/postgresql/data
    volumes:
      - pg_v15_data:/var/lib/postgresql/data
      - ./scripts/init_v15.sql:/docker-entrypoint-initdb.d/init_v15.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      retries: 10
    restart: unless-stopped
