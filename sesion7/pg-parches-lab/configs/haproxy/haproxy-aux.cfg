global
    maxconn 100
    log     stdout format raw local0

defaults
    log     global
    mode    tcp
    retries 2
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s

# -----------------------------------------------------------
# Stats UI — http://localhost:7000
# -----------------------------------------------------------
listen stats
    mode  http
    bind  *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# -----------------------------------------------------------
# Puerto 5000 — escritura (solo primario activo via Patroni API)
# HAProxy usa GET /primary contra el puerto 8008 de cada nodo.
# Patroni responde 200 solo en el líder actual.
# FIX: hostnames actualizados (pg-X → pgX) y puerto de check
#      unificado a 8008 (puerto interno del contenedor, no del host).
# -----------------------------------------------------------
listen pg_write
    bind *:5000
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pgprimary  pgprimary:5432  maxconn 20 check port 8008
    server pgreplica1 pgreplica1:5432 maxconn 20 check port 8008
    server pgreplica2 pgreplica2:5432 maxconn 20 check port 8008

# -----------------------------------------------------------
# Puerto 5001 — lectura (réplicas, round-robin)
# Patroni responde 200 a GET /replica en los nodos standby.
# El primario devuelve 503 en /replica y queda excluido
# automáticamente del pool de lectura.
# -----------------------------------------------------------
listen pg_read
    bind *:5001
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pgprimary  pgprimary:5432  maxconn 20 check port 8008
    server pgreplica1 pgreplica1:5432 maxconn 20 check port 8008
    server pgreplica2 pgreplica2:5432 maxconn 20 check port 8008
