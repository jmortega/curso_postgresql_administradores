version: "3.8"

# =============================================================
# pgvector Lab — PostgreSQL 16 con extensión pgvector
#
# Puerto:  5432 → PostgreSQL
# Acceso:  psql -h localhost -U postgres -d vectordb
# =============================================================

networks:
  pgvector_net:
    driver: bridge

volumes:
  pgvector_data:

services:

  postgres:
    image: pgvector/pgvector:pg16        # imagen oficial con pgvector preinstalado
    container_name: pgvector-lab
    hostname: pgvector-lab
    networks:
      - pgvector_net
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_lab
      POSTGRES_DB:       vectordb
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vectordb || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
