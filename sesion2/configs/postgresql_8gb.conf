# =============================================================
# postgresql.conf — Nodo producción 8 GB RAM
# PostgreSQL 16 + pgvector + PostGIS + pg_stat_statements
#                          + pg_wait_sampling
# =============================================================

# ── Conexiones ────────────────────────────────────────────────
listen_addresses            = '*'
port                        = 5432
max_connections             = 100          # 32GB tenía 200 — con 8GB hay menos margen

# ── Memoria ───────────────────────────────────────────────────
# 25% de 8 GB = 2 GB para caché compartida
shared_buffers              = 2GB

# 16 MB por operación — 100 conexiones × 2 ops × 16 MB = 3.2 GB worst case
work_mem                    = 16MB

# 256 MB — suficiente para vacuuming e índices medianos
maintenance_work_mem        = 256MB

# SO + shared_buffers ≈ 6 GB disponibles (75% de 8 GB)
effective_cache_size        = 6GB

# ── Paralelismo ───────────────────────────────────────────────
# Con 8 GB hay que ser más conservador — menos workers simultáneos
max_worker_processes        = 4
max_parallel_workers        = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# ── Extensiones con preload obligatorio ───────────────────────
shared_preload_libraries    = 'pg_stat_statements,pg_wait_sampling'

# ── pg_stat_statements ────────────────────────────────────────
pg_stat_statements.track            = all
pg_stat_statements.track_utility    = on
pg_stat_statements.max              = 5000          # reducido de 10000

# ── pg_wait_sampling ──────────────────────────────────────────
pg_wait_sampling.history_size       = 2000          # reducido de 5000
pg_wait_sampling.profile_period     = 10

# ── WAL y checkpoint ──────────────────────────────────────────
wal_level                   = replica
max_wal_senders             = 3                     # reducido de 5
wal_keep_size               = 256MB                 # reducido de 512MB
checkpoint_completion_target = 0.9
wal_buffers                 = 16MB                  # reducido de 64MB
min_wal_size                = 512MB                 # reducido de 1GB
max_wal_size                = 2GB                   # reducido de 4GB

# ── Planificador ──────────────────────────────────────────────
default_statistics_target   = 100                   # defecto — 200 consume más memoria
random_page_cost            = 1.1                   # SSD
effective_io_concurrency    = 100                   # reducido de 200

# ── Autovacuum ────────────────────────────────────────────────
autovacuum                  = on
autovacuum_max_workers      = 3                     # reducido de 5
autovacuum_vacuum_cost_delay = 5ms                  # más suave para no saturar I/O

# ── Logging ───────────────────────────────────────────────────
log_destination             = 'stderr'
logging_collector           = off
log_min_duration_statement  = 1000                  # subido a 1s — menos ruido
log_connections             = on
log_disconnections          = on
log_lock_waits              = on
log_line_prefix             = '%t [%p] %q%u@%d '

# ── Autenticación ─────────────────────────────────────────────
hba_file                    = '/etc/postgresql/pg_hba.conf'
