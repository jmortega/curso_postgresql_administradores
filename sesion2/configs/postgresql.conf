# =============================================================
# postgresql.conf — Sesión 2
# PostgreSQL 16 + pgvector + PostGIS + pg_stat_statements
#                            + pg_wait_sampling
# =============================================================

# ── Conexiones ────────────────────────────────────────────────
listen_addresses            = '*'
port                        = 5432
max_connections             = 100

# ── Memoria ───────────────────────────────────────────────────
shared_buffers              = 256MB
work_mem                    = 8MB
maintenance_work_mem        = 64MB
effective_cache_size        = 512MB

# ── Extensiones que requieren carga en el arranque ────────────
# pg_stat_statements: estadísticas de consultas (normalizadas)
# pg_wait_sampling:   muestreo de eventos de espera
# Ambas DEBEN estar en shared_preload_libraries para funcionar.
# pgvector y PostGIS NO necesitan preload — se activan con CREATE EXTENSION.
shared_preload_libraries    = 'pg_stat_statements,pg_wait_sampling'

# ── Parámetros de pg_stat_statements ─────────────────────────
pg_stat_statements.track            = all      # rastrear todas las consultas
pg_stat_statements.track_utility    = on       # incluir COPY, CREATE, etc.
pg_stat_statements.max              = 10000    # máx consultas almacenadas

# ── Parámetros de pg_wait_sampling ───────────────────────────
pg_wait_sampling.history_size       = 5000     # muestras en el historial
pg_wait_sampling.profile_period     = 10       # intervalo de muestreo (ms)

# ── WAL y replicación ─────────────────────────────────────────
wal_level                   = replica
max_wal_senders             = 5
wal_keep_size               = 128MB

# ── Logging ───────────────────────────────────────────────────
log_destination             = 'stderr'
logging_collector           = off
log_min_duration_statement  = 1000     # logear consultas > 1 segundo
log_connections             = on
log_disconnections          = on
log_lock_waits              = on
log_line_prefix             = '%t [%p] %q%u@%d '

# ── Autenticación ─────────────────────────────────────────────
hba_file                    = '/etc/postgresql/pg_hba.conf'
