# =============================================================
# pg_hba.conf — PostgreSQL Client Authentication Configuration
# =============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Conexiones locales (socket Unix) — siempre trust para el proceso postgres
local   all             all                                     trust

# Conexiones desde localhost
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Conexiones normales desde la red Docker (cualquier subred 172.x.x.x)
host    all             all             172.0.0.0/8             trust

# ── REPLICACIÓN ───────────────────────────────────────────────
# FIX: estas líneas son las que faltaban.
# La imagen postgres:alpine genera pg_hba.conf con trust para conexiones
# normales (controlado por POSTGRES_HOST_AUTH_METHOD=trust), pero NO añade
# entradas para conexiones de tipo "replication" — hay que añadirlas
# explícitamente. Sin esto, pg_basebackup falla con:
#   FATAL: no pg_hba.conf entry for replication connection
host    replication     all             172.0.0.0/8             trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
