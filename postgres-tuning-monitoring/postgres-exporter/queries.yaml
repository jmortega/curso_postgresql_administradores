# ============================================================================
# Consultas personalizadas para pg_stat_statements, replicación, WAL,
# locks, bloat, autovacuum y diagnóstico avanzado
# ============================================================================

# ── Actividad actual: pg_stat_activity ──────────────────────────────────────
pg_stat_activity_detail:
  query: |
    SELECT
      state,
      wait_event_type,
      wait_event,
      count(*) AS count,
      max(EXTRACT(EPOCH FROM (now() - query_start))) AS max_duration_seconds
    FROM pg_stat_activity
    WHERE pid <> pg_backend_pid()
    GROUP BY state, wait_event_type, wait_event
  metrics:
    - state:
        usage: LABEL
        description: "Estado de la conexión"
    - wait_event_type:
        usage: LABEL
        description: "Tipo de evento de espera"
    - wait_event:
        usage: LABEL
        description: "Evento de espera"
    - count:
        usage: GAUGE
        description: "Número de conexiones en este estado"
    - max_duration_seconds:
        usage: GAUGE
        description: "Duración máxima de la consulta más larga en este estado"

# ── Bloqueos: pg_locks ────────────────────────────────────────────────────────
pg_locks_detail:
  query: |
    SELECT
      mode,
      granted::text,
      count(*) AS count
    FROM pg_locks
    GROUP BY mode, granted
  metrics:
    - mode:
        usage: LABEL
        description: "Tipo de bloqueo"
    - granted:
        usage: LABEL
        description: "Bloqueo concedido (true/false)"
    - count:
        usage: GAUGE
        description: "Número de bloqueos"

# ── Consultas bloqueantes ─────────────────────────────────────────────────────
pg_blocking_queries:
  query: |
    SELECT
      count(*) AS blocked_count,
      max(EXTRACT(EPOCH FROM (now() - a.query_start))) AS max_wait_seconds
    FROM pg_stat_activity a
    JOIN pg_stat_activity b ON b.pid = ANY(pg_blocking_pids(a.pid))
    WHERE a.wait_event_type = 'Lock'
  metrics:
    - blocked_count:
        usage: GAUGE
        description: "Número de consultas bloqueadas"
    - max_wait_seconds:
        usage: GAUGE
        description: "Tiempo máximo de espera en segundos"

# ── Replicación: lag en bytes y tiempo ────────────────────────────────────────
pg_replication_lag:
  query: |
    SELECT
      client_addr::text AS replica,
      application_name,
      state,
      sync_state,
      pg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) AS sent_lag_bytes,
      pg_wal_lsn_diff(sent_lsn, write_lsn) AS write_lag_bytes,
      pg_wal_lsn_diff(write_lsn, flush_lsn) AS flush_lag_bytes,
      pg_wal_lsn_diff(flush_lsn, replay_lsn) AS replay_lag_bytes,
      EXTRACT(EPOCH FROM write_lag) AS write_lag_seconds,
      EXTRACT(EPOCH FROM flush_lag) AS flush_lag_seconds,
      EXTRACT(EPOCH FROM replay_lag) AS replay_lag_seconds
    FROM pg_stat_replication
  metrics:
    - replica:
        usage: LABEL
        description: "Dirección IP de la réplica"
    - application_name:
        usage: LABEL
        description: "Nombre de la aplicación"
    - state:
        usage: LABEL
        description: "Estado de la replicación"
    - sync_state:
        usage: LABEL
        description: "Modo de sincronización"
    - sent_lag_bytes:
        usage: GAUGE
        description: "Lag enviado en bytes"
    - write_lag_bytes:
        usage: GAUGE
        description: "Lag de escritura en bytes"
    - flush_lag_bytes:
        usage: GAUGE
        description: "Lag de flush en bytes"
    - replay_lag_bytes:
        usage: GAUGE
        description: "Lag de replay en bytes"
    - write_lag_seconds:
        usage: GAUGE
        description: "Lag de escritura en segundos"
    - flush_lag_seconds:
        usage: GAUGE
        description: "Lag de flush en segundos"
    - replay_lag_seconds:
        usage: GAUGE
        description: "Lag de replay en segundos"

# ── WAL: estadísticas de escritura ───────────────────────────────────────────
pg_wal_stats:
  query: |
    SELECT
      wal_records,
      wal_fpi,
      wal_bytes,
      wal_buffers_full,
      wal_write,
      wal_sync,
      wal_write_time,
      wal_sync_time
    FROM pg_stat_wal
  metrics:
    - wal_records:
        usage: COUNTER
        description: "Total de registros WAL generados"
    - wal_fpi:
        usage: COUNTER
        description: "Total de Full Page Images (FPI) en WAL"
    - wal_bytes:
        usage: COUNTER
        description: "Total de bytes WAL generados"
    - wal_buffers_full:
        usage: COUNTER
        description: "Veces que el buffer WAL se llenó"
    - wal_write:
        usage: COUNTER
        description: "Número de escrituras WAL"
    - wal_sync:
        usage: COUNTER
        description: "Número de sincronizaciones WAL"
    - wal_write_time:
        usage: COUNTER
        description: "Tiempo total de escritura WAL (ms)"
    - wal_sync_time:
        usage: COUNTER
        description: "Tiempo total de sync WAL (ms)"

# ── Autovacuum: actividad y estado ────────────────────────────────────────────
pg_autovacuum_activity:
  query: |
    SELECT
      schemaname,
      relname AS tablename,
      n_dead_tup,
      n_live_tup,
      CASE WHEN (n_live_tup + n_dead_tup) > 0
        THEN ROUND(100.0 * n_dead_tup / (n_live_tup + n_dead_tup), 2)
        ELSE 0 END AS dead_tup_ratio,
      last_autovacuum,
      last_autoanalyze,
      autovacuum_count,
      autoanalyze_count,
      EXTRACT(EPOCH FROM (now() - last_autovacuum)) AS seconds_since_autovacuum
    FROM pg_stat_user_tables
    ORDER BY n_dead_tup DESC
    LIMIT 50
  metrics:
    - schemaname:
        usage: LABEL
        description: "Schema de la tabla"
    - tablename:
        usage: LABEL
        description: "Nombre de la tabla"
    - n_dead_tup:
        usage: GAUGE
        description: "Número de tuplas muertas"
    - n_live_tup:
        usage: GAUGE
        description: "Número de tuplas vivas"
    - dead_tup_ratio:
        usage: GAUGE
        description: "Ratio de tuplas muertas (%)"
    - autovacuum_count:
        usage: COUNTER
        description: "Número de autovacuums ejecutados"
    - autoanalyze_count:
        usage: COUNTER
        description: "Número de autoanalyzes ejecutados"
    - seconds_since_autovacuum:
        usage: GAUGE
        description: "Segundos desde el último autovacuum"

# ── Cache hit ratio por base de datos ─────────────────────────────────────────
pg_cache_hit_ratio:
  query: |
    SELECT
      datname,
      blks_hit,
      blks_read,
      CASE WHEN (blks_hit + blks_read) > 0
        THEN ROUND(100.0 * blks_hit / (blks_hit + blks_read), 4)
        ELSE 100 END AS hit_ratio
    FROM pg_stat_database
    WHERE datname NOT IN ('template0', 'template1')
  metrics:
    - datname:
        usage: LABEL
        description: "Nombre de la base de datos"
    - blks_hit:
        usage: COUNTER
        description: "Bloques leídos desde cache"
    - blks_read:
        usage: COUNTER
        description: "Bloques leídos desde disco"
    - hit_ratio:
        usage: GAUGE
        description: "Ratio de acierto en cache (%)"

# ── Slots de replicación ──────────────────────────────────────────────────────
pg_replication_slots_detail:
  query: |
    SELECT
      slot_name,
      slot_type,
      active::text,
      database,
      pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) AS retained_bytes,
      confirmed_flush_lsn::text AS confirmed_flush
    FROM pg_replication_slots
  metrics:
    - slot_name:
        usage: LABEL
        description: "Nombre del slot"
    - slot_type:
        usage: LABEL
        description: "Tipo de slot"
    - active:
        usage: LABEL
        description: "Slot activo"
    - database:
        usage: LABEL
        description: "Base de datos del slot"
    - retained_bytes:
        usage: GAUGE
        description: "Bytes de WAL retenidos por el slot"

# ── Configuraciones críticas ──────────────────────────────────────────────────
pg_settings_detail:
  query: |
    SELECT
      name,
      setting,
      unit
    FROM pg_settings
    WHERE name IN (
      'max_connections', 'shared_buffers', 'effective_cache_size',
      'work_mem', 'maintenance_work_mem', 'wal_buffers',
      'checkpoint_completion_target', 'max_wal_size',
      'min_wal_size', 'wal_level', 'max_wal_senders',
      'hot_standby', 'synchronous_commit', 'fsync'
    )
  metrics:
    - name:
        usage: LABEL
        description: "Nombre del parámetro"
    - setting:
        usage: LABEL
        description: "Valor del parámetro"
    - unit:
        usage: LABEL
        description: "Unidad del parámetro"

# ── Top consultas por tiempo total (pg_stat_statements) ───────────────────────
pg_stat_statements_top:
  query: |
    SELECT
      LEFT(query, 80) AS query_snippet,
      calls,
      total_exec_time,
      mean_exec_time,
      stddev_exec_time,
      rows,
      shared_blks_hit,
      shared_blks_read,
      blk_read_time,
      blk_write_time
    FROM pg_stat_statements
    ORDER BY total_exec_time DESC
    LIMIT 20
  metrics:
    - query_snippet:
        usage: LABEL
        description: "Fragmento de la consulta"
    - calls:
        usage: COUNTER
        description: "Número de llamadas"
    - total_exec_time:
        usage: COUNTER
        description: "Tiempo total de ejecución (ms)"
    - mean_exec_time:
        usage: GAUGE
        description: "Tiempo medio de ejecución (ms)"
    - rows:
        usage: COUNTER
        description: "Filas procesadas"
    - shared_blks_hit:
        usage: COUNTER
        description: "Bloques compartidos en cache"
    - shared_blks_read:
        usage: COUNTER
        description: "Bloques compartidos leídos de disco"
