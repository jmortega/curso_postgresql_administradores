# =============================================================
# postgresql.conf — laboratorio de Optimización, Tuning y
# Pruebas de Carga (valores orientados a un entorno de laboratorio
# de ~2-4 GB RAM asignados al contenedor; ajustar en producción).
# =============================================================

# ── Extensiones cargadas al inicio ────────────────────────────
shared_preload_libraries = 'pg_stat_statements'

# ── Estadísticas de consultas (pg_stat_statements) ────────────
pg_stat_statements.track      = all
pg_stat_statements.max        = 10000
track_activity_query_size     = 2048
track_io_timing               = on

# ── Memoria ────────────────────────────────────────────────────
shared_buffers        = 512MB
effective_cache_size  = 1536MB
work_mem              = 32MB
maintenance_work_mem  = 128MB

# ── Planificador (ajustar random_page_cost=1.1 si el disco es SSD) ─
random_page_cost          = 1.1
effective_io_concurrency  = 200
default_statistics_target = 100

# ── WAL y checkpoints ──────────────────────────────────────────
wal_level            = replica
max_wal_senders      = 5
wal_keep_size         = 1GB
wal_buffers          = 16MB
checkpoint_completion_target = 0.9
max_wal_size         = 2GB
min_wal_size         = 512MB

# ── Paralelismo ────────────────────────────────────────────────
max_worker_processes            = 8
max_parallel_workers            = 8
max_parallel_workers_per_gather = 4

# ── Logging (necesario para pgBadger) ─────────────────────────
logging_collector            = on
log_directory                = '/var/log/postgresql'
log_filename                 = 'postgresql-%Y-%m-%d.log'
log_rotation_age              = 1d
log_destination               = 'stderr'
log_min_duration_statement    = 100
log_checkpoints                = on
log_connections                 = on
log_disconnections              = on
log_lock_waits                  = on
log_autovacuum_min_duration     = 250
log_line_prefix                 = '%t [%p] %q%u@%d '

# ── Autenticación ──────────────────────────────────────────────
hba_file = '/etc/postgresql/pg_hba.conf'
