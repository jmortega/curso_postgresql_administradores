# docker-compose.yml
services:

  # ── Base de datos compartida ─────────────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics          # BD principal para datos de negocio
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_pass
    ports:
      - "5433:5432"                   # 5433 en host → 5432 interno
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Metabase (BD interna propia) ─────────────────────────────────────────
  metabase-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase_pass
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caché y colas para Superset) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Superset ───────────────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Metabase ──────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase_pass
      MB_DB_HOST: metabase-db
    depends_on:
      metabase-db:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  db_data:
  metabase_db_data:
  redis_data:
