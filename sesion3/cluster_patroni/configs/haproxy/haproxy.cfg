global
    maxconn 200
    log     stdout format raw local0

defaults
    log     global
    mode    tcp
    retries 2
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s

# ── Stats UI ─────────────────────────────────────────────────
listen stats
    mode  http
    bind  *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# ── Escritura: siempre al nodo primario ─────────────────────
# FIX: usar IPs estáticas en lugar de hostnames.
# HAProxy 2.8 con init-addr none no resuelve DNS en runtime
# sin un resolver explícito, dejando los backends en MAINT.
# Las IPs están fijadas en docker-compose.yml (172.30.0.x).
listen pg_write
    bind *:5000
    mode tcp
    option httpchk
    http-check connect port 8008
    http-check send meth GET uri /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node1 172.30.0.20:5432 maxconn 50 check port 8008
    server pg-node2 172.30.0.21:5432 maxconn 50 check port 8008
    server pg-node3 172.30.0.22:5432 maxconn 50 check port 8008

# ── Lectura: réplicas en round-robin ─────────────────────────
listen pg_read
    bind *:5001
    mode tcp
    balance roundrobin
    option httpchk
    http-check connect port 8008
    http-check send meth GET uri /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node1 172.30.0.20:5432 maxconn 50 check port 8008
    server pg-node2 172.30.0.21:5432 maxconn 50 check port 8008
    server pg-node3 172.30.0.22:5432 maxconn 50 check port 8008
