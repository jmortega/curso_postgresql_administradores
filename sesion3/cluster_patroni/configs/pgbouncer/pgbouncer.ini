[databases]
; HAProxy enruta al primario activo — PgBouncer apunta a HAProxy
appdb    = host=haproxy port=5000 dbname=appdb
; Lectura directa a réplicas vía HAProxy puerto 5001
appdb_ro = host=haproxy port=5001 dbname=appdb

[pgbouncer]
listen_addr            = 0.0.0.0
listen_port            = 6432
unix_socket_dir        = /tmp

; Autenticación
auth_type              = scram-sha-256
auth_file              = /etc/pgbouncer/userlist.txt

; Modo de pooling: transaction es el más eficiente
pool_mode              = transaction

; Tamaño del pool
max_client_conn        = 1000
default_pool_size      = 50
min_pool_size          = 10
reserve_pool_size      = 5
reserve_pool_timeout   = 5

; Timeouts
server_idle_timeout       = 600
server_lifetime           = 3600
client_idle_timeout       = 0
query_timeout             = 0
server_connect_timeout    = 15
server_login_retry        = 15

; Logging
log_connections        = 1
log_disconnections     = 1
log_pooler_errors      = 1
stats_period           = 60

; Administración
admin_users            = postgres
stats_users            = stats_user
