# node-exporter como Deployment normal en Minikube
# (DaemonSet con hostNetwork causa problemas en algunos entornos Minikube)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-exporter
  namespace: postgres-lab
  labels:
    app: node-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          args:
            - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|snap|boot)($$|/)"
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: postgres-lab
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
