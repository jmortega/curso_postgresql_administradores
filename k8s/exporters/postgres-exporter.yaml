apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: postgres-lab
data:
  queries.yaml: |
    pg_replication:
      query: |
        SELECT
          CASE WHEN pg_is_in_recovery() THEN 1 ELSE 0 END AS is_replica,
          COALESCE(EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp())), 0) AS lag
      master: true
      metrics:
        - is_replica:
            usage: "GAUGE"
            description: "1 si réplica"
        - lag:
            usage: "GAUGE"
            description: "Lag replicación (s)"

    pg_database_size:
      query: |
        SELECT datname, pg_database_size(datname) AS size_bytes
        FROM pg_database
        WHERE datname NOT IN ('template0','template1')
      metrics:
        - datname:
            usage: "LABEL"
        - size_bytes:
            usage: "GAUGE"
            description: "Tamaño BD (bytes)"

    pg_long_running_queries:
      query: |
        SELECT count(*) AS count,
               max(EXTRACT(EPOCH FROM (clock_timestamp()-query_start))) AS max_seconds
        FROM pg_stat_activity
        WHERE state NOT IN ('idle') AND query_start IS NOT NULL
          AND EXTRACT(EPOCH FROM (clock_timestamp()-query_start)) > 60
      master: true
      metrics:
        - count:
            usage: "GAUGE"
            description: "Queries lentas"
        - max_seconds:
            usage: "GAUGE"
            description: "Duración máxima (s)"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: postgres-lab
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://pgadmin:pgadmin123@postgres:5432/labdb?sslmode=disable"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yaml
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: postgres-lab
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
