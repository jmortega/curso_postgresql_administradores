# ⚠️  En producción usa Sealed Secrets, Vault o External Secrets Operator.
#     Para el laboratorio se definen en texto plano (base64).
#
#  echo -n 'pgadmin'    | base64  →  cGdhZG1pbg==
#  echo -n 'pgadmin123' | base64  →  cGdhZG1pbjEyMw==
#  echo -n 'labdb'      | base64  →  bGFiZGI=

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres-lab
type: Opaque
data:
  POSTGRES_USER:     cGdhZG1pbg==       # pgadmin
  POSTGRES_PASSWORD: cGdhZG1pbjEyMw==  # pgadmin123
  POSTGRES_DB:       bGFiZGI=           # labdb

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: postgres-lab
type: Opaque
data:
  GF_SECURITY_ADMIN_USER:     YWRtaW4=        # admin
  GF_SECURITY_ADMIN_PASSWORD: YWRtaW4xMjM=   # admin123
