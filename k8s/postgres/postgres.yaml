apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: postgres-lab
data:
  01_init.sql: |
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE USER monitor WITH PASSWORD 'monitor123';
    GRANT pg_monitor TO monitor;

    CREATE USER appuser WITH PASSWORD 'app123';
    GRANT CONNECT ON DATABASE labdb TO appuser;

    CREATE SCHEMA IF NOT EXISTS shop;
    GRANT USAGE ON SCHEMA shop TO appuser;

    CREATE TABLE shop.customers (
        id         BIGSERIAL PRIMARY KEY,
        email      TEXT UNIQUE NOT NULL,
        name       TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE shop.products (
        id         BIGSERIAL PRIMARY KEY,
        sku        TEXT UNIQUE NOT NULL,
        name       TEXT NOT NULL,
        price      NUMERIC(10,2) NOT NULL CHECK (price >= 0),
        stock      INT NOT NULL DEFAULT 0
    );

    CREATE TABLE shop.orders (
        id          BIGSERIAL PRIMARY KEY,
        customer_id BIGINT NOT NULL REFERENCES shop.customers(id),
        status      TEXT NOT NULL DEFAULT 'pending'
                      CHECK (status IN ('pending','paid','shipped','cancelled')),
        total       NUMERIC(12,2),
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE shop.order_items (
        id         BIGSERIAL PRIMARY KEY,
        order_id   BIGINT NOT NULL REFERENCES shop.orders(id) ON DELETE CASCADE,
        product_id BIGINT NOT NULL REFERENCES shop.products(id),
        qty        INT NOT NULL CHECK (qty > 0),
        unit_price NUMERIC(10,2) NOT NULL
    );

    CREATE INDEX idx_orders_customer   ON shop.orders(customer_id);
    CREATE INDEX idx_orders_status     ON shop.orders(status);
    CREATE INDEX idx_order_items_order ON shop.order_items(order_id);

    INSERT INTO shop.customers (email, name)
    SELECT 'user'||n||'@example.com', 'Customer '||n
    FROM generate_series(1, 500) AS n;

    INSERT INTO shop.products (sku, name, price, stock)
    SELECT 'SKU-'||lpad(n::text,5,'0'), 'Product '||n,
           round((random()*200+5)::numeric,2), floor(random()*500)::int
    FROM generate_series(1, 200) AS n;

    INSERT INTO shop.orders (customer_id, status, total, created_at)
    SELECT floor(random()*500+1)::bigint,
           (ARRAY['pending','paid','shipped','cancelled'])[floor(random()*4+1)],
           round((random()*500+10)::numeric,2),
           now() - (random() * interval '365 days')
    FROM generate_series(1, 2000);

    INSERT INTO shop.order_items (order_id, product_id, qty, unit_price)
    SELECT o.id,
           floor(random()*200+1)::bigint,
           floor(random()*5+1)::int,
           round((random()*200+5)::numeric,2)
    FROM shop.orders o
    CROSS JOIN generate_series(1, floor(random()*4+1)::int);

    ANALYZE;

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres-lab
  labels:
    app: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
          args:
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.track=all"
            - "-c"
            - "track_activity_query_size=2048"
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=256MB"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pgadmin", "-d", "labdb"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pgadmin", "-d", "labdb"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: postgres-init-sql

---
# Servicio headless interno — usado por el StatefulSet y postgres_exporter
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: postgres-lab
spec:
  selector:
    app: postgres
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# Servicio interno con ClusterIP — usado por pgadmin y otras apps dentro del cluster
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres-lab
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# Servicio NodePort — acceso externo y minikube service postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: postgres-lab
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
